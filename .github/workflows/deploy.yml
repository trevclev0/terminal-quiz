name: Deploy
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        with:
          token: ${{ github.token }}
          environment: Preview (${{ github.head_ref }})
          initial-status: pending

      - name: Setup
        uses: ./.github/actions/setup-project

      - name: Run build
        run: pnpm build

      - name: Patch Redirected Config for Preview
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        run: |
          node -e "
            const fs = require('fs');
            const file = 'dist/quiz_app/wrangler.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));

            // Override production values with preview values
            config.name = 'quiz-app-preview';
            config.workers_dev = true;
            delete config.routes;

            // Force the deployment to bind to the preview D1 database
            config.d1_databases = [
              {
                binding: 'DB',
                database_name: 'terminal-quest-preview',
                database_id: '04e5b1c3-3e5d-498e-aafa-8230c4bbdee0'
              }
            ];

            fs.writeFileSync(file, JSON.stringify(config, null, 2));
          "

      - name: Apply D1 Migrations
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            ${{ github.ref == 'refs/heads/main'
              && 'd1 migrations apply terminal-quest --remote'
              || 'd1 migrations apply terminal-quest-preview --remote --env preview'
            }}

      - name: Deploy to Cloudflare
        id: deploy
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            ${{ github.ref == 'refs/heads/main'
              && 'deploy'
              || 'deploy --env preview'
            }}

      - name: Update Deployment (Success)
        uses: chrnorm/deployment-status@v2
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.deployment.conclusion != 'skipped' && steps.deploy.outcome == 'success'
        with:
          token: ${{ github.token }}
          environment-url: ${{ steps.deploy.outputs.deployment-url }}
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update Deployment (Failure)
        uses: chrnorm/deployment-status@v2
        if: always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && steps.deployment.conclusion != 'skipped' && steps.deploy.outcome != 'success'
        with:
          token: ${{ github.token }}
          state: 'error'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
