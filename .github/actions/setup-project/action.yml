# .github/actions/setup-project/action.yml
name: Setup Project
description: "Setup Node.js, pnpm, and Bun for the project"
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .tool-versions
        cache: 'pnpm'
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
